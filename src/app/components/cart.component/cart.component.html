<div class="p-6">
    <h1 class="text-2xl font-bold mb-4">Cart</h1>

    @if (cartItems().length === 0) {
        <p>Your cart is empty</p>
    } @else {
        @for (item of cartItems(); track item.id) {
            <div class="flex justify-between border p-3 mb-2 rounded">
                <div>
                    <h2>{{ item.product?.title }}</h2>
                    <p>₹ {{ item.product?.price }}</p>
                    <p>Qty: {{ item.quantity }}</p>
                </div>

                <button (click)="cartService.remove(item.id)" class="text-red-500">Remove</button>
            </div>
        }

        <h2 class="text-xl font-bold mt-4">Total: ₹ {{ total() }}</h2>
    }
</div>
