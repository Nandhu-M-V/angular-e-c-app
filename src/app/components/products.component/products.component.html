<div class="p-6">
    <h1 class="text-2xl font-bold mb-4">Products</h1>

    @if (productService.loading()) {
        <p>Loading...</p>
    }

    <div class="grid grid-cols-4 gap-6">
        <div
            *ngFor="let product of productService.products()"
            class="bg-white p-4 rounded-2xl shadow"
        >
            <img [src]="product.image" class="h-40 w-full object-contain" />

            <h2 class="mt-2 font-semibold">
                {{ product.title }}
            </h2>

            <p class="text-gray-500">₹ {{ product.price }}</p>

            <button
                (click)="cartService.addToCart(product)"
                class="mt-3 w-full bg-black text-white py-2 rounded-xl"
            >
                Add to Cart
            </button>
        </div>
    </div>
</div>
