<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">My Wishlist</h1>

    @if (wishlistProducts().length > 0) {
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            @for (product of wishlistProducts(); track product!.id) {
                <div class="border rounded p-4 flex flex-col">
                    <img
                        [src]="product!.images[0]"
                        [alt]="product!.title"
                        class="h-40 object-contain mb-2"
                    />

                    <h2 class="text-lg font-semibold">{{ product!.title }}</h2>
                    <p class="text-gray-700 mb-2">{{ product!.description | slice: 0 : 60 }}...</p>

                    <span class="font-bold text-indigo-600 mb-2"> ${{ product!.price }} </span>

                    <button
                        (click)="remove(product!.id)"
                        class="mt-auto bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600"
                    >
                        Remove
                    </button>
                </div>
            }
        </div>
    } @else {
        <p class="text-gray-500">Your wishlist is empty.</p>
    }
</div>
